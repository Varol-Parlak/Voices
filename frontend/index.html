<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voices — Personal AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <main class="main">
    <div class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner">
        
        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">✦</div>
          <h2>Lock In Twin</h2>
          <p>what you wanna do this time?</p>
        </div>

      </div>
    </div>

    <!-- Input -->
    <div class="input-bar">
      <div class="input-inner">
        <textarea
          id="msgInput"
          placeholder="Message Voices..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Voices in your head are talking again - shut 'em up</div>
    </div>
  </main>

</div>
<script src="scripts.js"></script>
</body>
</html>
