<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voices — Personal AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-name">Voices</span>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Chat
    </button>

    <div class="sidebar-label">Settings</div>

    <div class="sidebar-footer">
      Runs locally via Ollama
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner">

        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">✦</div>
          <h2>What's on your mind?</h2>
          <p>Ask anything — I've got your back.</p>
          <div class="suggestions">
            <span class="suggestion-chip" onclick="fillInput(this)">Explain backpropagation</span>
            <span class="suggestion-chip" onclick="fillInput(this)">Write a Python web scraper</span>
            <span class="suggestion-chip" onclick="fillInput(this)">What should I learn next?</span>
            <span class="suggestion-chip" onclick="fillInput(this)">Debug this code for me</span>
          </div>
        </div>

      </div>
    </div>

    <!-- Input -->
    <div class="input-bar">
      <div class="input-inner">
        <textarea
          id="msgInput"
          placeholder="Message Voices..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Voices runs on your machine — nothing leaves your device</div>
    </div>
  </main>

</div>

<script>
  const chatInner  = document.getElementById('chatInner');
  const chatArea   = document.getElementById('chatArea');
  const msgInput   = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');
  const emptyState = document.getElementById('emptyState');
  const newChatBtn = document.getElementById('newChatBtn');

  let isTyping = false;

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 180) + 'px';
    sendBtn.disabled = !msgInput.value.trim();
  });

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled && !isTyping) sendMessage();
    }
  });

  sendBtn.addEventListener('click', () => {
    if (!isTyping) sendMessage();
  });

  newChatBtn.addEventListener('click', () => {
    chatInner.innerHTML = '';
    chatInner.appendChild(emptyState);
    emptyState.style.display = 'flex';
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;
  });

  // ── Fill input from suggestion chips ─────────────────────────────────────
  function fillInput(el) {
    msgInput.value = el.textContent;
    msgInput.dispatchEvent(new Event('input'));
    msgInput.focus();
  }

  // ── Send message ──────────────────────────────────────────────────────────
  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;

    // Hide empty state
    emptyState.style.display = 'none';

    appendUserMsg(text);

    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;
    isTyping = true;

    const typingEl = showTyping();

    // Simulate AI response (replace this with real API call later)
    const delay = 900 + Math.random() * 800;
    setTimeout(() => {
      typingEl.remove();
      const reply = getMockReply(text);
      appendAiMsg(reply);
      isTyping = false;
      sendBtn.disabled = !msgInput.value.trim();
    }, delay);
  }

  // ── Append user message ───────────────────────────────────────────────────
  function appendUserMsg(text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg-group';
    wrap.innerHTML = `
      <div class="msg-user-wrap">
        <div class="msg msg-user">${escHtml(text)}</div>
      </div>`;
    chatInner.appendChild(wrap);
    scrollBottom();
  }

  // ── Append AI message ─────────────────────────────────────────────────────
  function appendAiMsg(text) {
    const voice = document.getElementById('voiceSelect').value;
    const wrap = document.createElement('div');
    wrap.className = 'msg-group';
    wrap.innerHTML = `
      <div class="msg-ai-wrap">
        <div class="ai-avatar">✦</div>
        <div class="msg msg-ai">${renderMarkdown(text)}</div>
      </div>`;
    chatInner.appendChild(wrap);
    scrollBottom();
  }

  // ── Typing indicator ──────────────────────────────────────────────────────
  function showTyping() {
    const el = document.createElement('div');
    el.className = 'typing-indicator';
    el.innerHTML = `
      <div class="ai-avatar">✦</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>`;
    chatInner.appendChild(el);
    scrollBottom();
    return el;
  }

  // ── Scroll to bottom ──────────────────────────────────────────────────────
  function scrollBottom() {
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
  }

  // ── Escape HTML ───────────────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Basic markdown renderer ───────────────────────────────────────────────
  function renderMarkdown(text) {
    return text
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .split('\n\n')
      .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
      .join('');
  }

  // ── Mock replies (remove when wiring real backend) ────────────────────────
  function getMockReply(input) {
    const lower = input.toLowerCase();
    if (lower.includes('hello') || lower.includes('hi'))
      return "Hey! What's up?";
    if (lower.includes('python'))
      return "Sure. What do you need — a snippet, a full script, or an explanation of something specific?";
    if (lower.includes('backprop'))
      return "Backpropagation is just the chain rule from calculus applied backwards through a neural network.\n\nYou compute the loss, then work backwards layer by layer — each weight gets nudged by how much it contributed to the error. That's your gradient. Then you use it to update weights via gradient descent.\n\nWant the math or a code walkthrough?";
    return "Got it. Hook this up to `control.py` and I'll give you a real answer.";
  }
</script>
</body>
</html>
